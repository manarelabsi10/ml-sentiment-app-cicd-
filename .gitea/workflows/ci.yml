name: CI Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5001
  IMAGE_NAME: ml-sentiment-app

jobs:
  setup-and-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m textblob.download_corpora
      - name: Start app and check health
        run: |
          uvicorn src.inference:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -s http://localhost:8000/health | grep -q "healthy"
          echo "Application is healthy!"

  lint:
    runs-on: ubuntu-latest
    needs: setup-and-health
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ruff
        run: ruff check src/ tests/ > ruff-report.txt 2>&1
      - name: Upload ruff report
        uses: actions/upload-artifact@v3
        with:
          name: ci-reports-${{ gitea.run_id }}
          path: ruff-report.txt

  type-check:
    runs-on: ubuntu-latest
    needs: setup-and-health
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run mypy
        run: mypy src/ tests/ > mypy-report.txt 2>&1
      - name: Upload mypy report
        uses: actions/upload-artifact@v3
        with:
          name: ci-reports-${{ gitea.run_id }}
          path: mypy-report.txt

  test:
    runs-on: ubuntu-latest
    needs: setup-and-health
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m textblob.download_corpora
      - name: Run pytest
        run: pytest --cov=src --cov-report=term-missing > pytest-report.txt 2>&1
      - name: Upload pytest report
        uses: actions/upload-artifact@v3
        with:
          name: ci-reports-${{ gitea.run_id }}
          path: pytest-report.txt

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  sbom:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for SBOM
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Generate SBOM
        run: syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -o spdx-json=sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: ci-reports-${{ gitea.run_id }}
          path: sbom.spdx.json
